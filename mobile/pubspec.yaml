name: vehicle_survey
description: Vehicle Survey mobile app for field surveyors. Android-only.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.7.0

  # Secure storage / local storage
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity / location / device
  connectivity_plus: ^6.0.5
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Image capture / pick / compress
  image_picker: ^1.1.2
  wechat_assets_picker: ^9.2.1
  flutter_image_compress: ^2.3.0

  # UI
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.4
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
